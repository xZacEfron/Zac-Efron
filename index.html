<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .player {
            width: 300px;
            /* Aquí cargamos la imagen que me enviaste */
            background-image: url('https://xatimg.com/image/FvxzX661moRe.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            /* Este filtro le da el toque oscuro para que se lea el texto */
            box-shadow: inset 0 0 0 200px rgba(0,0,0,0.5); 
        }
        h2 { margin: 10px 0 5px 0; }
        p { margin: 0; font-size: 0.9em; opacity: 0.8; }
    </style>
</head>
<body>

<div class="player">
    <h2>Mi Reproductor</h2>
    <p>¡Diseño personalizado!</p>
</div>

</body>
</html>
